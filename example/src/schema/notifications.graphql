# ==============================================================================
# Farmers Market Platform — Notifications Domain
# ==============================================================================
# Multi-channel notification system with polymorphic payloads.
# Uses GraphQL unions for type-safe notification content.
# ==============================================================================

# ------------------------------------------------------------------------------
# Notification
# ------------------------------------------------------------------------------

"""
Delivered notification record. The `payload` union carries structured,
type-safe context so clients can deep-link and render rich previews
without parsing free-text strings.
"""
type Notification implements Timestamped @model @scope(allow: [ADMIN, VENDOR, SHOP]) {
  id: UUID!
  recipientUserId: UUID! @serverOnly

  channel: NotificationChannel!
  category: NotificationCategory!
  priority: NotificationPriority!

  title: String! @constraint(maxLength: 200)
  body: String! @constraint(maxLength: 1000)

  " Structured payload for client-side rendering and deep-linking. "
  payload: NotificationPayload!

  readAt: DateTime
  dismissedAt: DateTime
  clickedAt: DateTime

  " External delivery identifier (e.g. email message-id, push receipt). "
  deliveryRef: String @serverOnly @constraint(maxLength: 200)
  deliveryStatus: DeliveryStatus! @readOnly

  expiresAt: DateTime

  createdAt: DateTime! @readOnly
  updatedAt: DateTime! @readOnly
}

enum NotificationChannel {
  IN_APP
  EMAIL
  SMS
  PUSH
}

enum NotificationCategory {
  ORDER_UPDATE
  VENDOR_UPDATE
  PRODUCT_ALERT
  REVIEW_ACTIVITY
  PAYMENT_UPDATE
  PROMOTION
  SYSTEM
}

enum NotificationPriority {
  LOW
  NORMAL
  HIGH
  URGENT
}

enum DeliveryStatus {
  QUEUED
  SENT
  DELIVERED
  BOUNCED
  FAILED
}

# ------------------------------------------------------------------------------
# Notification Payloads (union + concrete types)
# ------------------------------------------------------------------------------

"""
Polymorphic notification content. Each variant carries the minimum context
needed for a rich client-side notification card.
"""
union NotificationPayload =
  | OrderStatusPayload
  | VendorOrderPayload
  | ReviewPayload
  | PaymentPayload
  | ProductAlertPayload
  | PromotionPayload
  | SystemPayload

"""
Order status changed — for customer-facing notifications.
"""
type OrderStatusPayload {
  orderId: UUID!
  orderNumber: String!
  previousStatus: OrderStatus
  newStatus: OrderStatus!
}

"""
Vendor order update — for vendor-facing notifications.
"""
type VendorOrderPayload {
  vendorOrderId: UUID!
  referenceNumber: String!
  orderId: UUID!
  event: OrderEvent!
}

"""
New review or review response posted.
"""
type ReviewPayload {
  reviewId: UUID!
  productId: UUID!
  productName: String!
  rating: Int
  """
  True if this is a vendor-response notification, false for new reviews.
  """
  isResponse: Boolean!
}

"""
Payment captured, failed, refund processed, payout completed, etc.
"""
type PaymentPayload {
  transactionId: UUID
  payoutId: UUID
  orderId: UUID
  amount: Money!
  event: PaymentEvent!
}

enum PaymentEvent {
  PAYMENT_SUCCEEDED
  PAYMENT_FAILED
  REFUND_ISSUED
  PAYOUT_COMPLETED
  PAYOUT_FAILED
}

"""
Product back in stock, price drop, season start, low-stock vendor alert.
"""
type ProductAlertPayload {
  productId: UUID!
  variantId: UUID
  productName: String!
  alertType: ProductAlertType!
  previousPrice: Money
  newPrice: Money
}

enum ProductAlertType {
  BACK_IN_STOCK
  LOW_STOCK
  PRICE_DROP
  SEASON_STARTED
  SEASON_ENDING
  NEW_PRODUCT
}

"""
Promotional campaigns — coupons, flash sales, seasonal events.
"""
type PromotionPayload {
  couponId: UUID
  couponCode: String
  title: String!
  description: String!
  expiresAt: DateTime
  deepLinkUrl: URL
}

"""
Platform maintenance, policy updates, feature announcements.
"""
type SystemPayload {
  severity: SystemSeverity!
  actionUrl: URL
  actionLabel: String
}

enum SystemSeverity {
  INFO
  WARNING
  CRITICAL
}

# ------------------------------------------------------------------------------
# Notification Preferences (per-category opt-out)
# ------------------------------------------------------------------------------

"""
Per-category, per-channel delivery preference. Users default to receiving
all notifications; rows here represent explicit opt-outs or overrides.
"""
type NotificationPreference @model @scope(allow: [ADMIN, SHOP]) {
  id: UUID!
  userId: UUID! @serverOnly

  category: NotificationCategory @semanticNonNull
  channel: NotificationChannel @semanticNonNull
  enabled: Boolean @semanticNonNull

  user: User @hasOne @semanticNonNull
}
