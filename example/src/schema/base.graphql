# ==============================================================================
# Farmers Market Platform — Base Schema
# ==============================================================================
# Custom scalars, directive definitions, shared interfaces, and common enums.
# All domain schemas depend on this file.
# ==============================================================================

# ------------------------------------------------------------------------------
# Custom Scalars
# ------------------------------------------------------------------------------

"""
Fixed-precision decimal encoded as a string to avoid floating-point drift.
Suitable for monetary values (e.g. `"12.99"`).
Conforms to IEEE 754 decimal128 semantics.
"""
scalar Decimal @gqlbase_typehint(type: string)

# ------------------------------------------------------------------------------
# Domain Directives
# ------------------------------------------------------------------------------

"""
Declares which access scopes may resolve or mutate this type or field.
The transformer enforces visibility per scope at schema-generation time.
"""
directive @scope(allow: [AccessScope!]!) on OBJECT | FIELD_DEFINITION

"""
Marks a field as requiring a minimum role level within the resolved scope.
Evaluated at runtime by the authorization layer.
"""
directive @auth(requires: Role!) on FIELD_DEFINITION

"""
Constrains a string or numeric field. Applied at input validation time.
At least one parameter must be provided.
"""
directive @constraint(
  minLength: Int
  maxLength: Int
  pattern: String
  min: Float
  max: Float
) on FIELD_DEFINITION | INPUT_FIELD_DEFINITION | ARGUMENT_DEFINITION

"""
Opt-in field-level caching hint. The transformer attaches Cache-Control
metadata to the response extensions when present.
"""
directive @cacheControl(maxAge: Int!, scope: CacheScope! = PUBLIC) on FIELD_DEFINITION | OBJECT

# ------------------------------------------------------------------------------
# Shared Interfaces
# ------------------------------------------------------------------------------

"""
Relay-compatible global object identification.
"""
interface Node {
  id: UUID!
}

"""
Standard timestamp pair. All @model types should implement this.
"""
interface Timestamped {
  createdAt: DateTime @readOnly @semanticNonNull
  updatedAt: DateTime @readOnly @semanticNonNull
}

"""
Extended audit trail for admin-managed entities.
"""
interface Auditable implements Timestamped {
  createdAt: DateTime! @readOnly
  updatedAt: DateTime! @readOnly
  createdBy: UUID @readOnly @serverOnly
  updatedBy: UUID @readOnly @serverOnly
}

"""
Entities that support logical (soft) deletion.
Hard deletes are never performed on production data.
"""
interface SoftDeletable {
  deletedAt: DateTime @readOnly @serverOnly
  isArchived: Boolean! @readOnly
}

"""
Entities with an optimistic-concurrency version vector.
"""
interface Versioned {
  version: Int! @readOnly
}

# ------------------------------------------------------------------------------
# Shared Enums
# ------------------------------------------------------------------------------

enum AccessScope {
  ADMIN
  VENDOR
  SHOP
}

enum Role {
  SUPER_ADMIN
  ADMIN
  VENDOR_OWNER
  VENDOR_STAFF
  CUSTOMER
  GUEST
}

enum CacheScope {
  PUBLIC
  PRIVATE
}

enum DayOfWeek {
  MONDAY
  TUESDAY
  WEDNESDAY
  THURSDAY
  FRIDAY
  SATURDAY
  SUNDAY
}

enum Currency {
  USD
  EUR
  GBP
  CAD
}

# ------------------------------------------------------------------------------
# Shared Value Types (embedded, non-model)
# ------------------------------------------------------------------------------

"""
Monetary amount with explicit currency. Never store bare floats for money.
"""
type Money {
  amount: Decimal!
  currency: Currency!
}

input MoneyInput {
  amount: Decimal!
  currency: Currency!
}

"""
GPS coordinates for market locations, delivery zones, etc.
"""
type GeoPoint {
  latitude: Float!
  longitude: Float!
}

input GeoPointInput {
  latitude: Float!
  longitude: Float!
}

"""
Inclusive time range for a single day, in HH:mm (24h) local time.
"""
type TimeRange {
  opensAt: String!
  closesAt: String!
}

input TimeRangeInput {
  opensAt: String!
  closesAt: String!
}

"""
Generic paginated connection following Relay specification.
"""
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}
